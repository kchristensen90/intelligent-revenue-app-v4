const heatDays = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
const heatDayTotals = { Mon: 112, Tue: 131, Wed: 108, Thu: 139, Fri: 187, Sat: 109, Sun: 85 };
const heatWeights = [0.15,0.08,0.06,0.04,0.05,0.12,0.35,0.7,1.2,1.9,2.6,3.2,3.7,4.2,4.9,5.4,5.1,4.3,3.4,2.7,2.0,1.4,0.8,0.4];
const heatTotal = (() => {
  const wsum = heatWeights.reduce((a, b) => a + b, 0);
  const rows = {};
  heatDays.forEach((d, di) => {
    const total = heatDayTotals[d];
    rows[d] = heatWeights.map((w, h) => {
      const j = 0.7 + 0.6 * Math.abs(Math.sin((di + 1) * (h + 3) * 1.3));
      return Math.max(0, Math.round(total * (w / wsum) * j));
    });
  });
  return rows;
})();

// Sparkline — tiny inline chart, Stripe-style
const Sparkline = ({ data, color = '#2E6B4F', height = 30, width = 80 }) => {
  if (!data || data.length === 0) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  // Area fill
  const areaPoints = `0,${height} ${points} ${width},${height}`;
  return (
    <svg width={width} height={height} className="overflow-visible">
      <defs>
        <linearGradient id={`spark-${color.replace('#', '')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <polygon points={areaPoints} fill={`url(#spark-${color.replace('#', '')})`} />
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

// Date range picker — single-purpose dropdown that shows both dates
const DateRangePicker = ({ label, value, icon = 'calendar' }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const presets = ['Last 7 days', 'Last 30 days', 'Last 90 days', 'Year to date', 'Custom range…'];
  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(!open)}
              className="inline-flex items-center gap-2 px-3 py-2 bg-white dark:bg-ir-darksurface border border-ir-line dark:border-ir-darkline rounded-lg hover:border-ir-gray3 dark:hover:border-ir-darkline2 transition-colors">
        <Icon name={icon} size={15} className="text-ir-gray dark:text-ir-darkgray" />
        <span className="text-[14.5px] text-ir-gray2 dark:text-ir-darkgray2 font-medium">{label}</span>
        <span className="text-[15.5px] text-ir-ink dark:text-ir-darkink font-medium tabular-nums">{value}</span>
        <Icon name="chevron-down" size={13} className="text-ir-gray2 dark:text-ir-darkgray2" />
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-2 w-56 bg-white dark:bg-ir-darksurface border border-ir-line dark:border-ir-darkline rounded-lg shadow-xl z-20 slide-up overflow-hidden">
          <div className="px-3 py-2 text-[13px] text-ir-gray2 dark:text-ir-darkgray2 font-medium border-b border-ir-line dark:border-ir-darkline tracking-wider uppercase">{label}</div>

// Filter dropdown — used on Conversations page
const FilterDropdown = ({ label, options }) => {
  const [open, setOpen] = useState(false);
  const [selected, setSelected] = useState([]);
  const ref = useRef();
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const toggle = (opt) => setSelected(s => s.includes(opt) ? s.filter(x => x !== opt) : [...s, opt]);
  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(!open)}
              className="w-full px-3 py-1.5 bg-ir-surface dark:bg-ir-darksurface border border-ir-line dark:border-ir-darkline rounded-md text-[14.5px] text-ir-gray dark:text-ir-darkgray flex items-center justify-between hover:border-ir-gray3">
        <span className="truncate">
          {label}{selected.length > 0 && <span className="text-ir-blue ml-1 font-medium">· {selected.length}</span>}
        </span>
        <Icon name="chevron-down" size={12} />
      </button>
      {open && (
        <div className="absolute left-0 right-0 top-full mt-1 bg-white dark:bg-ir-darksurface border border-ir-line dark:border-ir-darkline rounded-lg shadow-xl z-20 slide-up overflow-hidden min-w-[200px]">
          <div className="px-3 py-2 text-[11.5px] text-ir-gray2 dark:text-ir-darkgray2 font-medium border-b border-ir-line dark:border-ir-darkline tracking-wider uppercase">Filter by {label.toLowerCase()}</div>
          {options.map(opt => (
            <button key={opt} onClick={() => toggle(opt)}
                    className="w-full text-left px-3 py-2 text-[14px] text-ir-ink dark:text-ir-darkink hover:bg-ir-surface dark:hover:bg-ir-darksurface2 flex items-center gap-2">
              <span className={`w-3.5 h-3.5 border rounded flex items-center justify-center flex-shrink-0 ${selected.includes(opt) ? 'bg-ir-blue border-ir-blue' : 'border-ir-line dark:border-ir-darkline'}`}>
                {selected.includes(opt) && <Icon name="check" size={10} className="text-white" />}
              </span>
              {opt}
            </button>
          ))}
          {selected.length > 0 && (
            <button onClick={() => setSelected([])} className="w-full text-left px-3 py-2 text-[13px] text-ir-gray dark:text-ir-darkgray border-t border-ir-line dark:border-ir-darkline hover:bg-ir-surface dark:hover:bg-ir-darksurface2">

          )}
        </div>
      )}
    </div>
  );
};

// Compact daily chart with a dashed "average" reference line
const AvgChart = ({ data, dataKey, xKey = 'day', avg, avgLabel, color, kind = 'bar', fmt = (v) => v, height = 96 }) => (
  <div style={{ width: '100%', height }}>
    <ResponsiveContainer>
      {kind === 'bar' ? (
        <BarChart data={data} margin={{ top: 6, right: 4, left: -28, bottom: -4 }}>
          <CartesianGrid stroke="currentColor" strokeOpacity={0.06} vertical={false} />
          <XAxis dataKey={xKey} tick={{ fontSize: 11, fill: 'currentColor', opacity: 0.55 }} axisLine={false} tickLine={false} />
          <YAxis tick={{ fontSize: 11, fill: 'currentColor', opacity: 0.55 }} axisLine={false} tickLine={false} width={38} />
          <Tooltip contentStyle={{ background: '#1C1A14', border: 'none', borderRadius: 6, fontSize: 12, color: 'white', padding: '5px 9px' }} cursor={{ fill: 'rgba(46, 107, 79, 0.05)' }} formatter={(v) => fmt(v)} />
          <ReferenceLine y={avg} stroke={color} strokeDasharray="4 3" strokeOpacity={0.65} label={{ value: avgLabel, position: 'right', fontSize: 10, fill: color }} />

        <LineChart data={data} margin={{ top: 6, right: 4, left: -28, bottom: -4 }}>
          <CartesianGrid stroke="currentColor" strokeOpacity={0.06} vertical={false} />
          <XAxis dataKey={xKey} tick={{ fontSize: 11, fill: 'currentColor', opacity: 0.55 }} axisLine={false} tickLine={false} />
          <YAxis tick={{ fontSize: 11, fill: 'currentColor', opacity: 0.55 }} axisLine={false} tickLine={false} width={38} tickFormatter={(v) => fmt(v)} />
          <Tooltip contentStyle={{ background: '#1C1A14', border: 'none', borderRadius: 6, fontSize: 12, color: 'white', padding: '5px 9px' }} cursor={{ stroke: 'rgba(46, 107, 79, 0.2)' }} formatter={(v) => fmt(v)} />
          <ReferenceLine y={avg} stroke={color} strokeDasharray="4 3" strokeOpacity={0.65} label={{ value: avgLabel, position: 'right', fontSize: 10, fill: color }} />
          <Line type="monotone" dataKey={dataKey} stroke={color} strokeWidth={1.75} dot={{ r: 2.5, fill: 'white', stroke: color, strokeWidth: 1.5 }} />

const FollowUpQueueTab = () => {
  const [expandedId, setExpandedId] = useState('fu-1');
  const [view, setView] = useState('active'); // active | completed | dismissed
  const [activeFilter, setActiveFilter] = useState('all'); // all | possible | waiting | cold
  const [itemStatus, setItemStatus] = useState({}); // { [id]: 'completed' | 'dismissed' }

  const setStatus = (id, newStatus) => {
    setItemStatus(prev => {
      const next = { ...prev };
      if (newStatus === null) delete next[id];
      else next[id] = newStatus;
      return next;
    });
    if (newStatus !== null) setExpandedId(null);
  };

  const counts = useMemo(() => {
    const active = followUpQueue.filter(i => !itemStatus[i.id]);
    return {
      active: active.length,
      completed: followUpQueue.filter(i => itemStatus[i.id] === 'completed').length,
      dismissed: followUpQueue.filter(i => itemStatus[i.id] === 'dismissed').length,
      possible: active.filter(i => i.status === 'possible').length,
      waiting: active.filter(i => i.status === 'waiting').length,
      cold: active.filter(i => i.daysAgo > 14).length
    };
  }, [itemStatus]);

  const visibleItems = followUpQueue.filter(i => {
    const s = itemStatus[i.id];
    if (view !== 'active') return s === view;
    if (s) return false; // hide actioned items in active view
    if (activeFilter === 'possible') return i.status === 'possible';
    if (activeFilter === 'waiting') return i.status === 'waiting';
    if (activeFilter === 'cold') return i.daysAgo > 14;
    return true;
  });

const HeatmapCard = () => {
  const [view, setView] = useState('answered');
  const [hover, setHover] = useState(null);
  const answeredRatio = (di, h) => 0.80 + 0.16 * Math.abs(Math.cos((di + 2) * (h + 1) * 0.7));
  const matrices = useMemo(() => {
    const total = {}, answered = {}, notAnswered = {};
    heatDays.forEach((d, di) => {
      total[d] = heatTotal[d];
      answered[d] = heatTotal[d].map((v, h) => Math.round(v * answeredRatio(di, h)));
      notAnswered[d] = heatTotal[d].map((v, h) => v - Math.round(v * answeredRatio(di, h)));
    });
    return { total, answered, notAnswered };
  }, []);
  const active = view === 'total' ? matrices.total : view === 'answered' ? matrices.answered : matrices.notAnswered;
  const max = Math.max(1, ...heatDays.flatMap(d => active[d]));
  const grand = heatDays.reduce((s, d) => s + active[d].reduce((a, b) => a + b, 0), 0);
  const colTotal = h => heatDays.reduce((s, d) => s + active[d][h], 0);
  const ramp = ['rgba(46,107,79,0.14)', 'rgba(46,107,79,0.28)', 'rgba(46,107,79,0.44)', 'rgba(46,107,79,0.62)', 'rgba(46,107,79,0.82)'];
  const level = v => { if (v <= 0) return -1; const t = v / max; return t < 0.2 ? 0 : t < 0.4 ? 1 : t < 0.6 ? 2 : t < 0.8 ? 3 : 4; };
  const hourLabel = h => h === 0 ? '12a' : h < 12 ? `${h}a` : h === 12 ? '12p' : `${h - 12}p`;
  const views = [
    { id: 'total', label: 'Total' },
    { id: 'answered', label: 'Calls Answered' },
    { id: 'notAnswered', label: 'Not Answered' }
  ];
  const LW = 42, RW = 46;
  return (
    <Card padding="p-5" className="mb-3">
      <div className="flex items-start justify-between mb-4 gap-4">
        <div>
          <h2 className="font-display text-[22px] text-ir-ink dark:text-ir-darkink leading-tight">Call Distribution Heatmap</h2>
          <p className="text-[14px] text-ir-gray dark:text-ir-darkgray mt-0.5">When calls land across the week · hover a cell for detail</p>
        </div>
        <div className="flex items-center gap-4">
          <div className="text-right">
            <div className="text-[12px] text-ir-gray2 dark:text-ir-darkgray2 uppercase tracking-wider">{views.find(v => v.id === view).label}</div>
            <div className="font-display text-[24px] text-ir-blue dark:text-ir-green leading-none tabular-nums">{grand.toLocaleString()}</div>
          </div>
          <div className="inline-flex items-center bg-ir-surface dark:bg-ir-darksurface border border-ir-line dark:border-ir-darkline rounded-lg p-0.5">
            {views.map(v => (
              <button key={v.id} onClick={() => setView(v.id)}
                      className={`px-2.5 py-1.5 text-[13px] font-medium rounded-md transition-colors ${view === v.id ? 'bg-white dark:bg-ir-darkpanel text-ir-ink dark:text-ir-darkink shadow-sm' : 'text-ir-gray dark:text-ir-darkgray hover:text-ir-ink dark:hover:text-ir-darkink2'}`}>
                {v.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="select-none">
        {/* Hour header */}
        <div className="flex items-center mb-1.5" style={{ paddingLeft: LW, paddingRight: RW }}>
          {heatWeights.map((_, h) => (
            <div key={h} className="flex-1 text-[11px] text-ir-gray2 dark:text-ir-darkgray2 tabular-nums" style={{ textAlign: 'left' }}>
              {h % 3 === 0 ? hourLabel(h) : ''}
            </div>
          ))}
          <div className="text-[11px] font-medium text-ir-gray2 dark:text-ir-darkgray2 text-right" style={{ width: RW }}>Total</div>
        </div>
        {/* Rows */}
        {heatDays.map(d => (
          <div key={d} className="flex items-center mb-[3px]">
            <div className="text-[13px] font-medium text-ir-ink dark:text-ir-darkink2" style={{ width: LW }}>{d}</div>
            <div className="flex-1 flex gap-[3px]">
              {active[d].map((v, h) => {
                const lv = level(v);
                const isHover = hover && hover.d === d && hover.h === h;
                return (
                  <div key={h} onMouseEnter={() => setHover({ d, h, v })} onMouseLeave={() => setHover(null)}
                       className="flex-1 flex items-center justify-center transition-transform"
                       style={{ height: 30, borderRadius: 4,
                         background: lv < 0 ? 'rgba(120,120,110,0.06)' : ramp[lv],
                         color: lv >= 3 ? '#fff' : lv >= 0 ? '#25573F' : 'transparent',
                         fontSize: 11.5, fontVariantNumeric: 'tabular-nums', cursor: 'default',
                         outline: isHover ? '1.5px solid #2E6B4F' : 'none', outlineOffset: -1 }}>
                    {v >= 12 ? v : ''}
                  </div>
                );
              })}
            </div>
            <div className="text-[13px] font-semibold text-ir-blue dark:text-ir-green text-right tabular-nums" style={{ width: RW }}>{active[d].reduce((a, b) => a + b, 0)}</div>
          </div>
        ))}
        {/* Column totals */}
        <div className="flex items-center mt-1.5 pt-1.5 border-t border-ir-line dark:border-ir-darkline" style={{ paddingLeft: LW, paddingRight: RW }}>
          {heatWeights.map((_, h) => (
            <div key={h} className="flex-1 text-[11px] text-ir-gray dark:text-ir-darkgray text-center tabular-nums">{colTotal(h) || ''}</div>
          ))}
        </div>
      </div>

      {/* Legend + footer */}
      <div className="flex items-center justify-between mt-4 pt-3 border-t border-ir-line dark:border-ir-darkline">
        <div className="flex items-center gap-2 text-[12.5px] text-ir-gray dark:text-ir-darkgray">
          <span>Low</span>
          <div className="flex gap-[3px]">
            {ramp.map((c, i) => <span key={i} className="rounded-sm" style={{ width: 18, height: 12, background: c }} />)}
          </div>
          <span>High</span>
        </div>
        <div className="flex items-center gap-1.5 text-[13px] text-ir-blue dark:text-ir-green">
          <Icon name="sparkle-mini" size={13} />
          {hover
            ? <span className="text-ir-ink2 dark:text-ir-darkink2"><span className="font-semibold">{hover.d} {hourLabel(hover.h)}</span> · {hover.v} {view === 'notAnswered' ? 'missed' : view === 'answered' ? 'answered' : 'calls'}</span>
            : <span>Fri 2–4pm is your busiest window — staff accordingly.</span>}
        </div>
      </div>
    </Card>
  );
};

const App = () => {
  const [activePage, setActivePage] = useState('home');
  const [role, setRole] = useState('agent');
  const [metricsTab, setMetricsTab] = useState('overview');
  const [activeProperty, setActiveProperty] = useState(properties[0]);
  const [paletteOpen, setPaletteOpen] = useState(false);

  // Helper: navigate to a page or a specific metrics sub-tab
  const navigateTo = useCallback((page, subTab = null) => {
    setActivePage(page);
    if (page === 'metrics' && subTab) setMetricsTab(subTab);
  }, []);

  // Cmd/Ctrl+K opens command palette
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setPaletteOpen(true);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  return (
    <ThemeProvider>
      <div className="flex h-screen overflow-hidden bg-ir-page dark:bg-ir-darkpage text-ir-ink dark:text-ir-darkink">
        <Sidebar activePage={activePage} setActivePage={setActivePage} openCommandPalette={() => setPaletteOpen(true)} />
        <main className="flex-1 flex flex-col min-w-0">
          {activePage !== 'chat' && (
            <Header activeProperty={activeProperty} setActiveProperty={setActiveProperty} role={role} setRole={setRole} />
          )}
          {activePage === 'home' && <HomePage navigateTo={navigateTo} role={role} />}
          {activePage === 'metrics' && <MetricsPage initialTab={metricsTab} />}
          {activePage === 'conversations' && <ConversationsPage />}
          {activePage === 'actions' && <ActionItemsPage role={role} />}
          {activePage === 'followup' && <FollowUpQueuePage />}
          {activePage === 'chat' && (
            <>
              <Header activeProperty={activeProperty} setActiveProperty={setActiveProperty} role={role} setRole={setRole} />
              <ChatPage />
            </>
          )}
        </main>
        <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} />
      </div>
    </ThemeProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
